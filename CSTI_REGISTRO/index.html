<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Equipos</title>
<link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div id="login">
<h2>Acceso al sistema</h2>
<input id="clave" type="password" placeholder="Clave">
<button onclick="verificar()">Entrar</button>
<p id="error"></p>
</div>

<div id="sistema">
<div class="container">
<div class="formulario">
<h2>Registro de Equipo</h2>
<p>Usuario: <span id="usuario"></span></p>
<input id="pc" placeholder="Nombre PC">
<input id="color" placeholder="Color">
<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
<input id="serial" placeholder="Serial">
<button onclick="registrar()">Registrar</button>
<button onclick="logout()">Salir</button>
</div>

<div class="panel">
<h3>Archivos</h3>
<div id="lista"></div>
</div>
</div>
</div>

<script src="js/usuarios.js"></script>
<script src="js/app.js"></script>

</body>
</html>
